<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Lolalytics Champion Rankings</title>
  <style>
    :root {
      color-scheme: light dark;
      --background: #f7f8fa;
      --foreground: #18202a;
      --surface: #ffffff;
      --surface-alt: #eef1f5;
      --muted: #5d6875;
      --border: #cfd6de;
      --accent: #1769aa;
      --accent-soft: #dceeff;
      --focus: #1476c6;
      --shadow: rgba(20, 30, 40, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #12171d;
        --foreground: #e7ecf2;
        --surface: #1a2129;
        --surface-alt: #222b35;
        --muted: #a7b1bd;
        --border: #3b4653;
        --accent: #67b7f7;
        --accent-soft: #193d59;
        --focus: #77c4ff;
        --shadow: rgba(0, 0, 0, 0.3);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--foreground);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    main {
      width: 100%;
      padding: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 600;
    }

    .metadata {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
      margin: 8px 0 18px;
      color: var(--muted);
    }

    .metadata a {
      color: var(--accent);
    }

    .toolbar {
      display: flex;
      align-items: start;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    button,
    summary,
    input,
    select {
      font: inherit;
    }

    button,
    summary,
    select {
      color: var(--foreground);
    }

    button {
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      padding: 7px 10px;
      cursor: pointer;
    }

    button:hover {
      background: var(--surface-alt);
    }

    button:focus-visible,
    summary:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .category-picker {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .category-toggle[aria-pressed="true"],
    .category-toggle[aria-pressed="mixed"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }

    .category-toggle[aria-pressed="mixed"] {
      border-style: dashed;
    }

    .popover-control {
      position: relative;
    }

    .popover-control summary {
      list-style: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      padding: 7px 10px;
      cursor: pointer;
    }

    .popover-control summary::-webkit-details-marker {
      display: none;
    }

    .popover-control[open] summary,
    .filter-control.has-active summary {
      border-color: var(--accent);
    }

    .filter-control.has-active summary {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }

    .column-picker,
    .filter-picker {
      position: absolute;
      z-index: 6;
      top: calc(100% + 5px);
      left: 0;
      display: grid;
      gap: 14px 20px;
      max-height: min(480px, 70vh);
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      box-shadow: 0 8px 24px var(--shadow);
    }

    .column-picker {
      grid-template-columns: repeat(2, minmax(170px, 1fr));
      min-width: 390px;
    }

    .filter-picker {
      grid-template-columns: repeat(2, minmax(250px, 1fr));
      min-width: 570px;
    }

    .column-group {
      min-width: 0;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .column-group legend {
      margin-bottom: 6px;
      color: var(--muted);
      font-weight: 600;
    }

    .column-options {
      display: grid;
      gap: 5px;
    }

    .column-option {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      cursor: pointer;
    }

    .filter-options {
      display: grid;
      gap: 6px;
    }

    .filter-option {
      display: grid;
      grid-template-columns: minmax(110px, 1fr) auto;
      align-items: center;
      gap: 8px;
    }

    .filter-option[data-active="true"] .filter-label {
      color: var(--accent);
      font-weight: 600;
    }

    .filter-panel-pair {
      grid-template-columns: repeat(2, 62px);
    }

    .result-count {
      align-self: center;
      color: var(--muted);
    }

    .table-wrap {
      max-width: 100%;
      overflow: auto;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    table {
      width: max-content;
      border-collapse: separate;
      border-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 7px 8px;
      text-align: right;
      white-space: nowrap;
    }

    thead th {
      position: sticky;
      z-index: 3;
      background: var(--surface-alt);
    }

    thead tr:first-child th {
      top: 0;
    }

    thead tr.filters th {
      top: 38px;
      padding: 4px 3px;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    tbody tr:hover td {
      background: var(--accent-soft);
    }

    .rank-column {
      width: 54px;
      min-width: 54px;
      text-align: right;
    }

    .champion-column {
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 145px;
      text-align: left;
      background: var(--surface);
      box-shadow: 1px 0 0 var(--border);
    }

    thead .champion-column {
      z-index: 5;
      background: var(--surface-alt);
    }

    tbody tr:hover .champion-column {
      background: var(--accent-soft);
    }

    .metric-column {
      min-width: 0;
    }

    .sort-button {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 2px;
      text-align: right;
      font-weight: 600;
    }

    .sort-button:hover {
      background: transparent;
      color: var(--accent);
    }

    .sort-indicator {
      display: inline-block;
      width: 1em;
      color: var(--accent);
    }

    .filter-pair {
      display: grid;
      grid-template-columns: repeat(2, 48px);
      justify-content: center;
      gap: 4px;
    }

    .filter-pair input,
    .filter-pair select {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--foreground);
      padding: 3px 4px;
    }

    .filter-pair input {
      text-align: right;
      appearance: textfield;
    }

    .filter-pair select {
      padding-inline: 1px;
      text-align: center;
      cursor: pointer;
    }

    .filter-pair input::placeholder {
      text-align: center;
    }

    .filter-pair input::-webkit-inner-spin-button,
    .filter-pair input::-webkit-outer-spin-button {
      margin: 0;
      appearance: none;
    }

    .empty-state {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 600px) {
      main {
        padding: 14px;
      }

      .column-picker,
      .filter-picker {
        position: fixed;
        top: auto;
        right: 14px;
        bottom: 14px;
        left: 14px;
        grid-template-columns: 1fr;
        min-width: 0;
      }

      .filter-picker {
        max-height: min(560px, 75vh);
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Lolalytics Champion Rankings</h1>
    <div class="metadata" id="metadata"></div>

    <div class="toolbar">
      <div class="category-picker" id="category-picker" aria-label="Metric categories"></div>
      <details class="popover-control column-control">
        <summary id="column-summary">Columns</summary>
        <div class="column-picker" id="column-picker"></div>
      </details>
      <details class="popover-control filter-control" id="filter-control">
        <summary id="filter-summary">Filters</summary>
        <div class="filter-picker" id="filter-picker"></div>
      </details>
      <button type="button" id="clear-filters">Clear filters</button>
      <span class="result-count" id="result-count" aria-live="polite"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </main>

  <script id="ranking-data" type="application/json">__LOLALYTICS_DATA__</script>
  <script>
    (() => {
      "use strict";

      const dataset = JSON.parse(document.getElementById("ranking-data").textContent);
      const metadata = document.getElementById("metadata");
      const categoryPicker = document.getElementById("category-picker");
      const columnPicker = document.getElementById("column-picker");
      const columnSummary = document.getElementById("column-summary");
      const filterControl = document.getElementById("filter-control");
      const filterPicker = document.getElementById("filter-picker");
      const filterSummary = document.getElementById("filter-summary");
      const clearFilters = document.getElementById("clear-filters");
      const resultCount = document.getElementById("result-count");
      const tableHead = document.getElementById("table-head");
      const tableBody = document.getElementById("table-body");
      const defaultCategories = new Set(
        dataset.categories
          .filter((category) => category.default_visible)
          .map((category) => category.key)
      );
      const visibleMetricKeys = new Set(
        dataset.metrics
          .filter((metric) => defaultCategories.has(metric.category))
          .map((metric) => metric.key)
      );
      const categoryButtons = new Map();
      const columnInputs = new Map();
      const filterRows = new Map();
      const filters = new Map(
        dataset.metrics
          .filter((metric) => metric.filterable)
          .map((metric) => [metric.key, { min: null, max: null }])
      );
      const tierChoices = Array.from(
        new Map(
          dataset.champions.map((champion) => {
            const tier = champion.values.tier;
            return [tier.sort_value ?? tier.value, tier.display];
          })
        ).entries()
      ).sort((a, b) => b[0] - a[0]);
      let sort = null;

      function titleCase(value) {
        return value
          .replaceAll("_plus", "+")
          .replaceAll("_", " ")
          .replace(/\b\w/g, (letter) => letter.toUpperCase());
      }

      function renderMetadata() {
        const generated = new Date(dataset.generated_at).toLocaleString();
        const items = [
          `${titleCase(dataset.filters.lane)} lane`,
          titleCase(dataset.filters.tier),
          dataset.filters.region === "all" ? "Global" : dataset.filters.region.toUpperCase(),
          dataset.filters.period === "current"
            ? "Current patch"
            : dataset.filters.period.includes(".")
              ? `Patch ${dataset.filters.period}`
              : `Rolling ${dataset.filters.period} days`,
          dataset.filters.queue,
          `${dataset.champions.length} champions`,
          `Generated ${generated}`
        ];
        for (const text of items) {
          const span = document.createElement("span");
          span.textContent = text;
          metadata.appendChild(span);
        }
        const link = document.createElement("a");
        link.href = dataset.source_url;
        link.textContent = "Source";
        link.target = "_blank";
        link.rel = "noreferrer";
        metadata.appendChild(link);
      }

      function filterIsActive(key) {
        const bounds = filters.get(key);
        return bounds && (bounds.min !== null || bounds.max !== null);
      }

      function activeFilterCount() {
        return [...filters.keys()].filter(filterIsActive).length;
      }

      function syncFilterSummary() {
        const count = activeFilterCount();
        filterSummary.textContent = count === 0 ? "Filters" : `Filters (${count})`;
        filterControl.classList.toggle("has-active", count > 0);
        for (const [key, row] of filterRows) {
          row.dataset.active = String(filterIsActive(key));
        }
      }

      function syncFilterControls(key) {
        const bounds = filters.get(key);
        if (!bounds) {
          return;
        }
        for (const bound of ["min", "max"]) {
          const value = bounds[bound] === null ? "" : String(bounds[bound]);
          document
            .querySelectorAll(`[data-filter="${key}"][data-bound="${bound}"]`)
            .forEach((control) => {
              if (control.value !== value) {
                control.value = value;
              }
            });
        }
        syncFilterSummary();
      }

      function setMetricFilter(metric, bound, rawValue) {
        const value = rawValue.trim() === "" ? null : Number(rawValue);
        filters.get(metric.key)[bound] = value;
        syncFilterControls(metric.key);
        renderBody();
      }

      function visibleMetrics() {
        return dataset.metrics.filter((metric) => visibleMetricKeys.has(metric.key));
      }

      function categoryMetrics(categoryKey) {
        return dataset.metrics.filter((metric) => metric.category === categoryKey);
      }

      function categoryState(categoryKey) {
        const metrics = categoryMetrics(categoryKey);
        const visibleCount = metrics.filter((metric) =>
          visibleMetricKeys.has(metric.key)
        ).length;
        if (visibleCount === 0) {
          return "false";
        }
        return visibleCount === metrics.length ? "true" : "mixed";
      }

      function syncVisibilityControls() {
        for (const [key, input] of columnInputs) {
          input.checked = visibleMetricKeys.has(key);
        }
        for (const category of dataset.categories) {
          categoryButtons
            .get(category.key)
            .setAttribute("aria-pressed", categoryState(category.key));
        }
        columnSummary.textContent =
          `Columns (${visibleMetricKeys.size}/${dataset.metrics.length})`;
      }

      function resetSortIfHidden() {
        if (sort && !visibleMetricKeys.has(sort.key)) {
          sort = null;
        }
      }

      function renderCategoryPicker() {
        for (const category of dataset.categories) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "category-toggle";
          button.textContent = category.label;
          categoryButtons.set(category.key, button);
          button.addEventListener("click", () => {
            const metrics = categoryMetrics(category.key);
            const hasVisibleMetric = metrics.some((metric) =>
              visibleMetricKeys.has(metric.key)
            );
            if (hasVisibleMetric) {
              metrics.forEach((metric) => visibleMetricKeys.delete(metric.key));
            } else {
              metrics.forEach((metric) => visibleMetricKeys.add(metric.key));
            }
            resetSortIfHidden();
            syncVisibilityControls();
            renderTable();
          });
          categoryPicker.appendChild(button);
        }
      }

      function renderColumnPicker() {
        for (const category of dataset.categories) {
          const group = document.createElement("fieldset");
          group.className = "column-group";
          const legend = document.createElement("legend");
          legend.textContent = category.label;
          const options = document.createElement("div");
          options.className = "column-options";

          for (const metric of categoryMetrics(category.key)) {
            const label = document.createElement("label");
            label.className = "column-option";
            const input = document.createElement("input");
            input.type = "checkbox";
            input.value = metric.key;
            columnInputs.set(metric.key, input);
            input.addEventListener("change", () => {
              if (input.checked) {
                visibleMetricKeys.add(metric.key);
              } else {
                visibleMetricKeys.delete(metric.key);
              }
              resetSortIfHidden();
              syncVisibilityControls();
              renderTable();
            });
            label.append(input, document.createTextNode(metric.label));
            options.appendChild(label);
          }

          group.append(legend, options);
          columnPicker.appendChild(group);
        }
        syncVisibilityControls();
      }

      function makeFilterControl(metric, bound) {
        const control = document.createElement(
          metric.key === "tier" ? "select" : "input"
        );
        if (control instanceof HTMLSelectElement) {
          const emptyOption = document.createElement("option");
          emptyOption.value = "";
          emptyOption.textContent = bound;
          control.appendChild(emptyOption);
          for (const [value, label] of tierChoices) {
            const option = document.createElement("option");
            option.value = String(value);
            option.textContent = label;
            control.appendChild(option);
          }
        } else {
          control.type = "number";
          control.step = "any";
          control.inputMode = "decimal";
          control.placeholder = bound;
        }
        control.dataset.filter = metric.key;
        control.dataset.bound = bound;
        control.setAttribute("aria-label", `${metric.label} ${bound}imum`);
        const savedValue = filters.get(metric.key)[bound];
        control.value = savedValue === null ? "" : String(savedValue);
        control.addEventListener(
          control instanceof HTMLSelectElement ? "change" : "input",
          () => setMetricFilter(metric, bound, control.value)
        );
        return control;
      }

      function renderFilterPicker() {
        for (const category of dataset.categories) {
          const metrics = categoryMetrics(category.key).filter(
            (metric) => metric.filterable
          );
          if (metrics.length === 0) {
            continue;
          }

          const group = document.createElement("fieldset");
          group.className = "column-group filter-group";
          const legend = document.createElement("legend");
          legend.textContent = category.label;
          const options = document.createElement("div");
          options.className = "filter-options";

          for (const metric of metrics) {
            const row = document.createElement("div");
            row.className = "filter-option";
            filterRows.set(metric.key, row);
            const label = document.createElement("span");
            label.className = "filter-label";
            label.textContent = metric.label;
            const pair = document.createElement("div");
            pair.className = "filter-pair filter-panel-pair";
            pair.append(
              makeFilterControl(metric, "min"),
              makeFilterControl(metric, "max")
            );
            row.append(label, pair);
            options.appendChild(row);
          }

          group.append(legend, options);
          filterPicker.appendChild(group);
        }
        syncFilterSummary();
      }

      function sortRows(rows) {
        if (!sort) {
          return rows.sort((a, b) => a.source_order - b.source_order);
        }
        const direction = sort.direction === "desc" ? -1 : 1;
        return rows.sort((a, b) => {
          const aValue =
            a.values[sort.key].sort_value ?? a.values[sort.key].value;
          const bValue =
            b.values[sort.key].sort_value ?? b.values[sort.key].value;
          const difference =
            aValue - bValue;
          return difference === 0
            ? a.source_order - b.source_order
            : difference * direction;
        });
      }

      function filteredRows() {
        const metrics = dataset.metrics.filter((metric) => metric.filterable);
        return dataset.champions.filter((champion) =>
          metrics.every((metric) => {
            const bounds = filters.get(metric.key);
            const entry = champion.values[metric.key];
            const value = entry.sort_value ?? entry.value;
            return (
              (bounds.min === null || value >= bounds.min) &&
              (bounds.max === null || value <= bounds.max)
            );
          })
        );
      }

      function setSort(key) {
        if (sort?.key === key) {
          sort.direction = sort.direction === "desc" ? "asc" : "desc";
        } else {
          sort = { key, direction: "desc" };
        }
        renderTable();
      }

      function makeMetricHeader(metric) {
        const th = document.createElement("th");
        th.className = "metric-column";
        th.dataset.metric = metric.key;
        th.setAttribute(
          "aria-sort",
          sort?.key === metric.key
            ? sort.direction === "desc" ? "descending" : "ascending"
            : "none"
        );

        const button = document.createElement("button");
        button.type = "button";
        button.className = "sort-button";
        button.addEventListener("click", () => setSort(metric.key));

        const label = document.createElement("span");
        label.textContent = metric.label;
        const indicator = document.createElement("span");
        indicator.className = "sort-indicator";
        indicator.textContent =
          sort?.key === metric.key
            ? sort.direction === "desc" ? "↓" : "↑"
            : "";
        button.append(label, document.createTextNode(" "), indicator);
        th.appendChild(button);
        return th;
      }

      function makeFilterHeader(metric) {
        const th = document.createElement("th");
        th.className = "metric-column";
        th.dataset.metric = metric.key;
        if (!metric.filterable) {
          th.textContent = "—";
          th.setAttribute("aria-label", `${metric.label} is categorical`);
          return th;
        }
        const pair = document.createElement("div");
        pair.className = "filter-pair";

        for (const bound of ["min", "max"]) {
          pair.appendChild(makeFilterControl(metric, bound));
        }
        th.appendChild(pair);
        return th;
      }

      function renderHead() {
        tableHead.replaceChildren();
        const metrics = visibleMetrics();

        const labels = document.createElement("tr");
        const rank = document.createElement("th");
        rank.className = "rank-column";
        rank.scope = "col";
        rank.textContent = "#";
        const champion = document.createElement("th");
        champion.className = "champion-column";
        champion.scope = "col";
        champion.textContent = "Champion";
        labels.append(rank, champion);
        for (const metric of metrics) {
          labels.appendChild(makeMetricHeader(metric));
        }

        const inputs = document.createElement("tr");
        inputs.className = "filters";
        const rankSpacer = document.createElement("th");
        rankSpacer.className = "rank-column";
        const championSpacer = document.createElement("th");
        championSpacer.className = "champion-column";
        inputs.append(rankSpacer, championSpacer);
        for (const metric of metrics) {
          inputs.appendChild(makeFilterHeader(metric));
        }

        tableHead.append(labels, inputs);
      }

      function renderBody() {
        tableBody.replaceChildren();
        const metrics = visibleMetrics();
        const rows = sortRows(filteredRows());
        const filterCount = activeFilterCount();
        const filterStatus =
          filterCount === 0
            ? ""
            : ` · ${filterCount} active filter${filterCount === 1 ? "" : "s"}`;
        resultCount.textContent =
          `${rows.length} of ${dataset.champions.length} champions${filterStatus}`;

        if (rows.length === 0) {
          const row = document.createElement("tr");
          const cell = document.createElement("td");
          cell.className = "empty-state";
          cell.colSpan = metrics.length + 2;
          cell.textContent = "No champions match the current filters.";
          row.appendChild(cell);
          tableBody.appendChild(row);
          return;
        }

        rows.forEach((champion, index) => {
          const row = document.createElement("tr");
          const rank = document.createElement("td");
          rank.className = "rank-column";
          rank.textContent = String(index + 1);
          const name = document.createElement("td");
          name.className = "champion-column";
          name.textContent = champion.name;
          row.append(rank, name);

          for (const metric of metrics) {
            const cell = document.createElement("td");
            cell.dataset.metric = metric.key;
            cell.textContent = champion.values[metric.key].display;
            row.appendChild(cell);
          }
          tableBody.appendChild(row);
        });
      }

      function renderTable() {
        renderHead();
        renderBody();
      }

      clearFilters.addEventListener("click", () => {
        for (const key of filters.keys()) {
          filters.set(key, { min: null, max: null });
          syncFilterControls(key);
        }
        renderBody();
      });

      document.querySelectorAll(".popover-control").forEach((control) => {
        control.addEventListener("toggle", () => {
          if (!control.open) {
            return;
          }
          document.querySelectorAll(".popover-control").forEach((other) => {
            if (other !== control) {
              other.open = false;
            }
          });
        });
      });

      renderMetadata();
      renderCategoryPicker();
      renderColumnPicker();
      renderFilterPicker();
      renderTable();
    })();
