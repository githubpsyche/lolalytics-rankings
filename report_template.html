<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Lolalytics Champion Rankings</title>
  <style>
    :root {
      color-scheme: light dark;
      --background: #f7f8fa;
      --foreground: #18202a;
      --surface: #ffffff;
      --surface-alt: #eef1f5;
      --muted: #5d6875;
      --border: #cfd6de;
      --accent: #1769aa;
      --accent-soft: #dceeff;
      --focus: #1476c6;
      --shadow: rgba(20, 30, 40, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #12171d;
        --foreground: #e7ecf2;
        --surface: #1a2129;
        --surface-alt: #222b35;
        --muted: #a7b1bd;
        --border: #3b4653;
        --accent: #67b7f7;
        --accent-soft: #193d59;
        --focus: #77c4ff;
        --shadow: rgba(0, 0, 0, 0.3);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--foreground);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    main {
      width: 100%;
      padding: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 600;
    }

    .metadata {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
      margin: 8px 0 18px;
      color: var(--muted);
    }

    .metadata a {
      color: var(--accent);
    }

    .toolbar {
      display: flex;
      align-items: start;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    button,
    summary,
    input {
      font: inherit;
    }

    button,
    summary {
      color: var(--foreground);
    }

    button {
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      padding: 7px 10px;
      cursor: pointer;
    }

    button:hover {
      background: var(--surface-alt);
    }

    button:focus-visible,
    summary:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .category-picker {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .category-toggle[aria-pressed="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }

    .result-count {
      align-self: center;
      color: var(--muted);
    }

    .table-wrap {
      max-width: 100%;
      overflow: auto;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    table {
      width: max-content;
      border-collapse: separate;
      border-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 7px 8px;
      text-align: right;
      white-space: nowrap;
    }

    thead th {
      position: sticky;
      z-index: 3;
      background: var(--surface-alt);
    }

    thead tr:first-child th {
      top: 0;
    }

    thead tr.filters th {
      top: 38px;
      padding: 4px 3px;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    tbody tr:hover td {
      background: var(--accent-soft);
    }

    .rank-column {
      width: 54px;
      min-width: 54px;
      text-align: right;
    }

    .champion-column {
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 145px;
      text-align: left;
      background: var(--surface);
      box-shadow: 1px 0 0 var(--border);
    }

    thead .champion-column {
      z-index: 5;
      background: var(--surface-alt);
    }

    tbody tr:hover .champion-column {
      background: var(--accent-soft);
    }

    .metric-column {
      min-width: 0;
    }

    .sort-button {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 2px;
      text-align: right;
      font-weight: 600;
    }

    .sort-button:hover {
      background: transparent;
      color: var(--accent);
    }

    .sort-indicator {
      display: inline-block;
      width: 1em;
      color: var(--accent);
    }

    .filter-pair {
      display: grid;
      grid-template-columns: repeat(2, 48px);
      justify-content: center;
      gap: 4px;
    }

    .filter-pair input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--foreground);
      padding: 3px 4px;
      text-align: right;
      appearance: textfield;
    }

    .filter-pair input::placeholder {
      text-align: center;
    }

    .filter-pair input::-webkit-inner-spin-button,
    .filter-pair input::-webkit-outer-spin-button {
      margin: 0;
      appearance: none;
    }

    .empty-state {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 600px) {
      main {
        padding: 14px;
      }

    }
  </style>
</head>
<body>
  <main>
    <h1>Lolalytics Champion Rankings</h1>
    <div class="metadata" id="metadata"></div>

    <div class="toolbar">
      <div class="category-picker" id="category-picker" aria-label="Metric categories"></div>
      <button type="button" id="clear-filters">Clear filters</button>
      <span class="result-count" id="result-count" aria-live="polite"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </main>

  <script id="ranking-data" type="application/json">__LOLALYTICS_DATA__</script>
  <script>
    (() => {
      "use strict";

      const dataset = JSON.parse(document.getElementById("ranking-data").textContent);
      const metadata = document.getElementById("metadata");
      const categoryPicker = document.getElementById("category-picker");
      const clearFilters = document.getElementById("clear-filters");
      const resultCount = document.getElementById("result-count");
      const tableHead = document.getElementById("table-head");
      const tableBody = document.getElementById("table-body");
      const activeCategories = new Set(
        dataset.categories
          .filter((category) => category.default_visible)
          .map((category) => category.key)
      );
      const filters = new Map(
        dataset.metrics
          .filter((metric) => metric.filterable)
          .map((metric) => [metric.key, { min: null, max: null }])
      );
      let sort = null;

      function titleCase(value) {
        return value
          .replaceAll("_plus", "+")
          .replaceAll("_", " ")
          .replace(/\b\w/g, (letter) => letter.toUpperCase());
      }

      function renderMetadata() {
        const generated = new Date(dataset.generated_at).toLocaleString();
        const items = [
          `${titleCase(dataset.filters.lane)} lane`,
          titleCase(dataset.filters.tier),
          dataset.filters.region === "all" ? "Global" : dataset.filters.region.toUpperCase(),
          dataset.filters.period === "current"
            ? "Current patch"
            : dataset.filters.period.includes(".")
              ? `Patch ${dataset.filters.period}`
              : `Rolling ${dataset.filters.period} days`,
          dataset.filters.queue,
          `${dataset.champions.length} champions`,
          `Generated ${generated}`
        ];
        for (const text of items) {
          const span = document.createElement("span");
          span.textContent = text;
          metadata.appendChild(span);
        }
        const link = document.createElement("a");
        link.href = dataset.source_url;
        link.textContent = "Source";
        link.target = "_blank";
        link.rel = "noreferrer";
        metadata.appendChild(link);
      }

      function clearMetricFilter(key) {
        if (!filters.has(key)) {
          return;
        }
        filters.set(key, { min: null, max: null });
        document.querySelectorAll(`input[data-filter="${key}"]`).forEach((input) => {
          input.value = "";
        });
      }

      function visibleMetrics() {
        return dataset.metrics.filter((metric) =>
          activeCategories.has(metric.category)
        );
      }

      function renderCategoryPicker() {
        for (const category of dataset.categories) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "category-toggle";
          button.textContent = category.label;
          button.setAttribute(
            "aria-pressed",
            activeCategories.has(category.key) ? "true" : "false"
          );
          button.addEventListener("click", () => {
            if (activeCategories.has(category.key)) {
              activeCategories.delete(category.key);
            } else {
              activeCategories.add(category.key);
            }
            button.setAttribute(
              "aria-pressed",
              activeCategories.has(category.key) ? "true" : "false"
            );
            if (
              sort &&
              !activeCategories.has(
                dataset.metrics.find((metric) => metric.key === sort.key).category
              )
            ) {
              sort = null;
            }
            renderTable();
          });
          categoryPicker.appendChild(button);
        }
      }

      function sortRows(rows) {
        if (!sort) {
          return rows.sort((a, b) => a.source_order - b.source_order);
        }
        const direction = sort.direction === "desc" ? -1 : 1;
        return rows.sort((a, b) => {
          const aValue =
            a.values[sort.key].sort_value ?? a.values[sort.key].value;
          const bValue =
            b.values[sort.key].sort_value ?? b.values[sort.key].value;
          const difference =
            aValue - bValue;
          return difference === 0
            ? a.source_order - b.source_order
            : difference * direction;
        });
      }

      function filteredRows() {
        const metrics = visibleMetrics();
        return dataset.champions.filter((champion) =>
          metrics.every((metric) => {
            if (!metric.filterable) {
              return true;
            }
            const bounds = filters.get(metric.key);
            const value = champion.values[metric.key].value;
            return (
              (bounds.min === null || value >= bounds.min) &&
              (bounds.max === null || value <= bounds.max)
            );
          })
        );
      }

      function setSort(key) {
        if (sort?.key === key) {
          sort.direction = sort.direction === "desc" ? "asc" : "desc";
        } else {
          sort = { key, direction: "desc" };
        }
        renderTable();
      }

      function makeMetricHeader(metric) {
        const th = document.createElement("th");
        th.className = "metric-column";
        th.dataset.metric = metric.key;
        th.setAttribute(
          "aria-sort",
          sort?.key === metric.key
            ? sort.direction === "desc" ? "descending" : "ascending"
            : "none"
        );

        const button = document.createElement("button");
        button.type = "button";
        button.className = "sort-button";
        button.addEventListener("click", () => setSort(metric.key));

        const label = document.createElement("span");
        label.textContent = metric.label;
        const indicator = document.createElement("span");
        indicator.className = "sort-indicator";
        indicator.textContent =
          sort?.key === metric.key
            ? sort.direction === "desc" ? "↓" : "↑"
            : "";
        button.append(label, document.createTextNode(" "), indicator);
        th.appendChild(button);
        return th;
      }

      function makeFilterHeader(metric) {
        const th = document.createElement("th");
        th.className = "metric-column";
        th.dataset.metric = metric.key;
        if (!metric.filterable) {
          th.textContent = "—";
          th.setAttribute("aria-label", `${metric.label} is categorical`);
          return th;
        }
        const pair = document.createElement("div");
        pair.className = "filter-pair";

        for (const bound of ["min", "max"]) {
          const input = document.createElement("input");
          input.type = "number";
          input.step = "any";
          input.inputMode = "decimal";
          input.placeholder = bound;
          input.dataset.filter = metric.key;
          input.setAttribute("aria-label", `${metric.label} ${bound}imum`);
          const savedValue = filters.get(metric.key)[bound];
          input.value = savedValue === null ? "" : String(savedValue);
          input.addEventListener("input", () => {
            const current = filters.get(metric.key);
            current[bound] =
              input.value.trim() === "" ? null : Number(input.value);
            renderBody();
          });
          pair.appendChild(input);
        }
        th.appendChild(pair);
        return th;
      }

      function renderHead() {
        tableHead.replaceChildren();
        const metrics = visibleMetrics();

        const labels = document.createElement("tr");
        const rank = document.createElement("th");
        rank.className = "rank-column";
        rank.scope = "col";
        rank.textContent = "#";
        const champion = document.createElement("th");
        champion.className = "champion-column";
        champion.scope = "col";
        champion.textContent = "Champion";
        labels.append(rank, champion);
        for (const metric of metrics) {
          labels.appendChild(makeMetricHeader(metric));
        }

        const inputs = document.createElement("tr");
        inputs.className = "filters";
        const rankSpacer = document.createElement("th");
        rankSpacer.className = "rank-column";
        const championSpacer = document.createElement("th");
        championSpacer.className = "champion-column";
        inputs.append(rankSpacer, championSpacer);
        for (const metric of metrics) {
          inputs.appendChild(makeFilterHeader(metric));
        }

        tableHead.append(labels, inputs);
      }

      function renderBody() {
        tableBody.replaceChildren();
        const metrics = visibleMetrics();
        const rows = sortRows(filteredRows());
        resultCount.textContent = `${rows.length} of ${dataset.champions.length} champions`;

        if (rows.length === 0) {
          const row = document.createElement("tr");
          const cell = document.createElement("td");
          cell.className = "empty-state";
          cell.colSpan = metrics.length + 2;
          cell.textContent = "No champions match the current filters.";
          row.appendChild(cell);
          tableBody.appendChild(row);
          return;
        }

        rows.forEach((champion, index) => {
          const row = document.createElement("tr");
          const rank = document.createElement("td");
          rank.className = "rank-column";
          rank.textContent = String(index + 1);
          const name = document.createElement("td");
          name.className = "champion-column";
          name.textContent = champion.name;
          row.append(rank, name);

          for (const metric of metrics) {
            const cell = document.createElement("td");
            cell.dataset.metric = metric.key;
            cell.textContent = champion.values[metric.key].display;
            row.appendChild(cell);
          }
          tableBody.appendChild(row);
        });
      }

      function renderTable() {
        renderHead();
        renderBody();
      }

      clearFilters.addEventListener("click", () => {
        for (const metric of dataset.metrics) {
          clearMetricFilter(metric.key);
        }
        renderBody();
      });

      renderMetadata();
      renderCategoryPicker();
      renderTable();
    })();
  </script>
</body>
</html>
